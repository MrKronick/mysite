<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MrKronick | Выбор языка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      cursor: url("https://i.ibb.co/VczmRrDc/Picsart-26-07-02-13-51-54-481.png") 16 2, auto;
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e8e9f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    a, button, .btn, .social-icon, .social-card, .badge, .project-card, .scroll-reveal, .logo, input, select, textarea, [role="button"], .clickable {
      cursor: url("https://i.ibb.co/KzFJq173/Picsart-26-07-02-13-52-46-609.png") 14 4, pointer;
    }
    .container {
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .language-grid {
      display: flex;
      gap: 3rem;
      justify-content: center;
      margin-top: 3rem;
      flex-wrap: wrap;
    }
    .lang-card {
      background: rgba(18, 20, 28, 0.65);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 2.5rem;
      padding: 3rem 2.5rem;
      text-decoration: none;
      color: #e8e9f0;
      transition: all 0.45s cubic-bezier(0.25, 0.8, 0.25, 1.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      box-shadow: 0 20px 45px rgba(0,0,0,0.6);
      width: 250px;
    }
    .lang-card:hover {
      transform: translateY(-15px) scale(1.03);
      background: rgba(108,99,255,0.15);
      border-color: #6c63ff;
      box-shadow: 0 35px 65px #6c63ff66;
    }
    .lang-flag {
      font-size: 4rem;
    }
    .lang-name {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
    }
    .gradient-text {
      background: linear-gradient(135deg, #b388ff, #6c63ff, #3f8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 3rem;
      background: linear-gradient(135deg, #fff, #b388ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(179,136,255,0.7));
      margin-bottom: 1rem;
    }
    /* Фоновые частицы (упрощённо) */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <div class="container">
    <div class="logo">MrKronick</div>
    <p style="font-size: 1.2rem; opacity: 0.7;">Выберите язык / Choose language</p>
    <div class="language-grid">
      <a href="ru.html" class="lang-card">
        <span class="lang-flag">🇷🇺</span>
        <span class="lang-name">Русский</span>
      </a>
      <a href="en.html" class="lang-card">
        <span class="lang-flag">🇬🇧</span>
        <span class="lang-name">English</span>
      </a>
    </div>
  </div>
  <script>
    (function() {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let w, h;
      let particles = [];
      const PARTICLE_COUNT = 60;
      function resize() {
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;
      }
      window.addEventListener('resize', resize);
      resize();
      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * w;
          this.y = Math.random() * h;
          this.radius = Math.random() * 2.5 + 0.5;
          this.speedX = (Math.random() - 0.5) * 0.3;
          this.speedY = (Math.random() - 0.5) * 0.3;
          this.opacity = Math.random() * 0.5 + 0.2;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
        }
        draw(ctx) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
          ctx.fillStyle = `rgba(179,136,255,${this.opacity})`;
          ctx.fill();
        }
      }
      for (let i=0; i<PARTICLE_COUNT; i++) particles.push(new Particle());
      function animate() {
        ctx.clearRect(0,0,w,h);
        particles.forEach(p => { p.update(); p.draw(ctx); });
        requestAnimationFrame(animate);
      }
      animate();
      window.addEventListener('mousemove', (e) => {
        particles.forEach(p => {
          const dx = p.x - e.clientX;
          const dy = p.y - e.clientY;
          if (Math.sqrt(dx*dx+dy*dy) < 100) {
            p.speedX += dx * 0.002;
            p.speedY += dy * 0.002;
          }
        });
      });
    })();
  </script>
</body>
</html>
